<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced Calculator</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #d61596, #2c5034);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .calculator {
    background: #d80606;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(112, 216, 8, 0.3);
    width: 320px;
  }

  #display {
    width: 100%;
    height: 60px;
    font-size: 1.8rem;
    text-align: right;
    padding: 10px;
    border: none;
    background: #f1f1f1;
    border-radius: 8px;
    margin-bottom: 10px;
    outline: none;
  }

  .history {
    font-size: 0.9rem;
    color: gray;
    height: 20px;
    text-align: right;
    margin-bottom: 5px;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    height: 60px;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .operator {
    background: #ff9800;
    color: white;
  }

  .equal {
    background: #4caf50;
    color: white;
  }

  .clear {
    background: #f44336;
    color: white;
  }

  .special {
    background: #607d8b;
    color: white;
  }
</style>
</head>

<body>

<div class="calculator">
  <div class="history" id="history"></div>
  <input type="text" id="display" disabled />

  <div class="buttons">
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="special" onclick="backspace()">⌫</button>
    <button class="special" onclick="append('%')">%</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  const display = document.getElementById("display");
  const history = document.getElementById("history");

  function append(value) {
    display.value += value;
  }

  function clearAll() {
    display.value = "";
    history.textContent = "";
  }

  function backspace() {
    display.value = display.value.slice(0, -1);
  }

  function calculate() {
    try {
      history.textContent = display.value;

      // safer evaluation instead of raw eval abuse risk
      let result = Function("return " + display.value)();

      display.value = result;
    } catch {
      display.value = "Error";
    }
  }

  // Keyboard support
  document.addEventListener("keydown", (e) => {
    if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
      append(e.key);
    } else if (e.key === "Enter") {
      calculate();
    } else if (e.key === "Backspace") {
      backspace();
    } else if (e.key === "Escape") {
      clearAll();
    }
  });
</script>

</body>
</html>
